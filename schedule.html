<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 02 · Schedule Your Kickoff Call — The Implant Initiative</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0c0f;--slate:#161d27;--panel:#1c2535;--border:rgba(255,255,255,.08);
  --gold:#8aa4be;--gold-bright:#c8a84b;--green:#5ecc8a;--red:#e05c5c;--white:#f4f7fa;--muted:#6b7a90;
  --font:"Plus Jakarta Sans",system-ui,sans-serif;
}
html,body{min-height:100%;font-family:var(--font);background:var(--ink);color:var(--white);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.013) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0}

.header{width:100%;max-width:1100px;padding:2rem 2rem 0;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
.logo img{height:38px;width:auto;display:block;opacity:.9}

.confidential{display:flex;align-items:center;gap:8px;padding:6px 14px;border:1px solid rgba(138,164,190,.2);background:rgba(138,164,190,.05);position:relative;overflow:hidden}
.confidential::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(138,164,190,.4),transparent)}
.confidential::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(138,164,190,.15),transparent)}
.conf-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);position:relative}
.conf-dot::before{content:"";position:absolute;inset:-3px;border-radius:50%;border:1px solid rgba(138,164,190,.3);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.conf-text{font-size:9px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.conf-lock{width:10px;height:10px;color:rgba(138,164,190,.5)}

main{width:100%;max-width:1100px;padding:3rem 2rem 5rem;position:relative;z-index:1;flex:1}

.hero{margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid var(--border)}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:.6rem;margin-bottom:1.25rem}
.eyebrow::before{content:"";width:18px;height:1px;background:var(--gold)}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1.03;letter-spacing:-.04em;margin-bottom:.85rem}
.hero h1 .accent{color:var(--gold)}
.hero p{font-size:.95rem;color:rgba(255,255,255,.45);line-height:1.85;max-width:560px}

.progress-track{display:flex;align-items:stretch;gap:0;margin-bottom:3rem;border:1px solid var(--border);position:relative}
.prog-step{flex:1;padding:.8rem 1.1rem;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border);transition:all .3s;display:flex;align-items:center;gap:.5rem;user-select:none}
.prog-step:last-child{border-right:none}
.prog-step.active{color:var(--white);background:rgba(138,164,190,.05)}
.prog-step.done{color:rgba(138,164,190,.5)}
.prog-step .num{font-size:1.2rem;font-weight:300;color:rgba(138,164,190,.2);transition:color .3s;line-height:1;font-variant-numeric:tabular-nums}
.prog-step.active .num{color:var(--gold-bright)}
.prog-step.done .num{color:rgba(138,164,190,.35)}
.progress-underline{position:absolute;bottom:0;height:2px;background:var(--gold-bright);left:25%;width:25%}

.step-header{margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.step-header h2{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.45rem}
.step-header p{font-size:.875rem;color:var(--muted);line-height:1.7}

/* Calendar wrapper — borrows the field/panel aesthetic */
.calendar-wrap{
  background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.calendar-wrap::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,168,75,.35),transparent);
}
.calendar-frame{
  min-height:780px;
  background:#fff;
}
.calendar-frame iframe{
  width:100%;
  border:none;
  display:block;
  min-height:780px;
}

footer{position:relative;z-index:1;width:100%;max-width:1100px;padding:1.5rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.footer-brand{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.2)}
.footer-note{font-size:10px;color:rgba(255,255,255,.15);letter-spacing:.06em}

@media(max-width:640px){
  .header{padding:1.5rem 1.25rem 0}
  main{padding:2rem 1.25rem 3rem}
  .hero{margin-bottom:2rem;padding-bottom:2rem}
  .progress-track{margin-bottom:2rem}
  .prog-step{padding:.65rem .55rem;font-size:9px;letter-spacing:.08em;gap:.35rem}
  .prog-step .num{font-size:.95rem}
  .calendar-frame,.calendar-frame iframe{min-height:880px}
  footer{padding:1.25rem 1.25rem;flex-direction:column;gap:.5rem;text-align:center}
}
</style>
</head>
